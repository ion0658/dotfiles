[env]
NPM_CONFIG_USERCONFIG = "{{ [xdg_config_home] | concat(with='npm') | concat(with='npmrc') | join_path }}"

[settings.npm]
package_manager = "pnpm"

[tools]
aube = { version = "latest" }
node = { version = "latest" }
pnpm = { version = "latest" }
bun = { version = "latest" }
deno = { version = "latest" }
